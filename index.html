<!DOCTYPE html>
<html lang="en">
<head>
    <title>WebXR Hand Tracking Template</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 100;
            pointer-events: none;
        }
        .instructions {
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="info">
        <div class="instructions">
            <b>WebXR Hand Tracking Template</b><br>
            Pinch Thumb & Index: Pick up objects | Make Fist: Destroy objects<br>
            Open Palm towards Face: Move Forward
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0/build/three.module.js';
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';
        import { XRHandModelFactory } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/XRHandModelFactory.js';

        // --- Configuration & Constants ---
        const PINCH_THRESHOLD = 0.02; // Meters
        const FIST_THRESHOLD = 0.08;  // Distance from tips to wrist
        const MOVE_SPEED = 0.03;      // Speed per frame
        const PALM_DOT_THRESHOLD = -0.5; // Palm facing head

        // --- Core Variables ---
        let camera, scene, renderer, hand1, hand2, handModelFactory;
        let controller1, controller2;
        let xrGroup; // Group for moving the user (locomotion)
        
        const interactables = [];
        const grabbedObjects = { left: null, right: null };

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            
            // xrGroup allows us to move the user in the virtual world without fighting the HMD tracking
            xrGroup = new THREE.Group();
            xrGroup.add(camera);
            scene.add(xrGroup);

            // 2. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 2, 1);
            scene.add(directionalLight);

            // 3. Environment
            const grid = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
            scene.add(grid);

            // Spawn Interactable Cubes
            const geometries = [new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.SphereGeometry(0.07, 16, 16)];
            for (let i = 0; i < 10; i++) {
                const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                const mesh = new THREE.Mesh(geometries[i % 2], material);
                mesh.position.set(Math.random() * 2 - 1, 0.5, Math.random() * -2 - 0.5);
                scene.add(mesh);
                interactables.push(mesh);
            }

            // 4. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            // Use local-floor to ensure Y=0 is the actual ground
            renderer.xr.setReferenceSpaceType('local-floor');
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // 5. Hand Tracking Setup
            handModelFactory = new XRHandModelFactory();

            // Hand 1 (Left)
            controller1 = renderer.xr.getController(0);
            xrGroup.add(controller1);
            hand1 = renderer.xr.getHand(0);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh"));
            xrGroup.add(hand1);

            // Hand 2 (Right)
            controller2 = renderer.xr.getController(1);
            xrGroup.add(controller2);
            hand2 = renderer.xr.getHand(1);
            hand2.add(handModelFactory.createHandModel(hand2, "mesh"));
            xrGroup.add(hand2);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Interaction Logic ---

        function getJointPosition(hand, jointName) {
            // WebXR Hand Joint Indices: 0=Wrist, 4=ThumbTip, 9=IndexTip, etc.
            if (hand && hand.joints && hand.joints[jointName]) {
                return hand.joints[jointName].position;
            }
            return null;
        }

        function handleGestures(hand, side) {
            if (!hand.joints || !hand.joints['wrist']) return;

            const wrist = hand.joints['wrist'].position;
            const thumbTip = hand.joints['thumb-phalanx-distal'].position; 
            const indexTip = hand.joints['index-finger-phalanx-distal'].position;
            const middleTip = hand.joints['middle-finger-phalanx-distal'].position;
            const ringTip = hand.joints['ring-finger-phalanx-distal'].position;
            const pinkyTip = hand.joints['pinky-finger-phalanx-distal'].position;

            // 1. PINCH DETECTION (Thumb to Index)
            const pinchDist = thumbTip.distanceTo(indexTip);
            const isPinching = pinchDist < PINCH_THRESHOLD;

            if (isPinching) {
                if (!grabbedObjects[side]) {
                    // Check for collision with interactables
                    interactables.forEach(obj => {
                        if (indexTip.distanceTo(obj.position) < 0.1) {
                            grabbedObjects[side] = obj;
                        }
                    });
                } else {
                    // Update object position to pinch point
                    grabbedObjects[side].position.lerp(indexTip, 0.4);
                }
            } else {
                grabbedObjects[side] = null; // Drop
            }

            // 2. FIST DETECTION (Break Logic)
            const isFist = (
                indexTip.distanceTo(wrist) < FIST_THRESHOLD &&
                middleTip.distanceTo(wrist) < FIST_THRESHOLD &&
                pinkyTip.distanceTo(wrist) < FIST_THRESHOLD
            );

            if (isFist) {
                interactables.forEach((obj, index) => {
                    if (wrist.distanceTo(obj.position) < 0.15) {
                        scene.remove(obj);
                        interactables.splice(index, 1);
                        // Add visual feedback here if desired
                    }
                });
            }

            // 3. PALM LOCOMOTION (Forward Move)
            // Check if hand is open (fingers far from wrist)
            const isOpen = indexTip.distanceTo(wrist) > FIST_THRESHOLD * 1.5;
            
            if (isOpen && !isPinching) {
                // Determine palm orientation using wrist and middle finger base
                const palmNormal = new THREE.Vector3();
                const v1 = new THREE.Vector3().subVectors(indexTip, wrist).normalize();
                const v2 = new THREE.Vector3().subVectors(pinkyTip, wrist).normalize();
                palmNormal.crossVectors(v1, v2).normalize();

                // Get direction user is looking
                const lookDir = new THREE.Vector3();
                camera.getWorldDirection(lookDir);

                // If palm normal points towards camera, move forward
                // We use dot product: if ~ -1, they face each other
                const cameraToHand = new THREE.Vector3().subVectors(camera.position, wrist).normalize();
                const alignment = palmNormal.dot(cameraToHand);

                if (alignment < PALM_DOT_THRESHOLD) {
                    xrGroup.position.x += lookDir.x * MOVE_SPEED;
                    xrGroup.position.z += lookDir.z * MOVE_SPEED;
                }
            }
        }

        // --- Animation Loop ---
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            // Update gestures for both hands
            handleGestures(hand1, 'left');
            handleGestures(hand2, 'right');

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
